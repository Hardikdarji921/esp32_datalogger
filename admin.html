<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Panel</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; }

        /* --- Button Styles for User Cards --- */
        .action-btn {
            padding: 5px 12px;
            border-radius: 6px;
            font-size: 14px;
            font-weight: 600;
            border: none;
            cursor: pointer;
            transition: background-color 0.2s, color 0.2s;
            color: white;
        }
        .approve-btn {
            background-color: #22c55e; /* green-500 */
        }
        .approve-btn:hover {
            background-color: #16a34a; /* green-600 */
        }
        .delete-btn {
            background-color: #ef4444; /* red-500 */
        }
        .delete-btn:hover {
            background-color: #dc2626; /* red-600 */
        }
        .details-btn {
            background-color: #64748b; /* slate-500 */
        }
        .details-btn:hover {
            background-color: #475569; /* slate-600 */
        }
    </style>
</head>
<body class="bg-gray-900 text-gray-200">
  <div class="container mx-auto p-4 md:p-8">
    <header class="flex justify-between items-center mb-8">
      <div>
        <h1 class="text-4xl font-bold text-white">Admin Panel</h1>
        <p class="text-gray-400">User Management</p>
      </div>
      <a href="HomePage.html" class="px-4 py-2 bg-indigo-600 hover:bg-indigo-700 text-white font-semibold rounded-lg transition-colors">&larr; Back to Dashboard</a>
    </header>
    <div class="grid grid-cols-1 lg:grid-cols-2 gap-8">
      <div class="bg-gray-800 p-6 rounded-xl border border-gray-700">
        <h2 class="text-2xl font-bold text-yellow-400 mb-4">Pending Approval</h2>
        <div id="pendingUsers" class="space-y-4"></div>
      </div>
      <div class="bg-gray-800 p-6 rounded-xl border border-gray-700">
        <h2 class="text-2xl font-bold text-green-400 mb-4">Active Users</h2>
        <div id="activeUsers" class="space-y-4"></div>
      </div>
    </div>
  </div>
  <script>
    //const API_BASE_URL = 'http://127.0.0.1:5000';		//used for run in Local system
    const API_BASE_URL = 'https://esp32-datalogger.onrender.com';		//used for run on render
	
    const token = localStorage.getItem('token');

    // Function to create the HTML for a user card
    function createUserCard(user) {
        const card = document.createElement('div');
        card.className = 'bg-gray-700 p-4 rounded-lg shadow-md';
        
        const approveButton = !user.is_active 
            ? `<button onclick="approveUser(${user.id})" class="action-btn approve-btn">Approve</button>` 
            : '';
        const deleteButton = user.role !== 'admin' 
            ? `<button onclick="deleteUser(${user.id})" class="action-btn delete-btn">Delete</button>` 
            : '';

        card.innerHTML = `
            <div class="flex justify-between items-start gap-4">
                <!-- User Info: Added min-w-0 to allow shrinking and truncate for long text -->
                <div class="min-w-0">
                    <h4 class="text-lg font-bold text-white truncate" title="${user.full_name} (@${user.username})">${user.full_name} <span class="text-gray-400 font-normal">(@${user.username})</span></h4>
                    <p class="text-sm text-gray-300 truncate" title="${user.email}">${user.email}</p>
                    <p class="text-sm text-gray-400 truncate" title="${user.company || ''}">${user.company || 'No company specified'}</p>
                </div>
                <!-- Action Buttons -->
                <div class="flex-shrink-0 flex items-center space-x-2">
                    ${approveButton}
                    ${deleteButton}
                    <button onclick="toggleDetails(this)" class="action-btn details-btn">Details &darr;</button>
                </div>
            </div>
            <!-- Collapsible Details -->
            <div class="details-content mt-4 pt-4 border-t border-gray-600" style="display: none;">
                <div class="grid grid-cols-1 sm:grid-cols-2 gap-4 text-sm">
                    <div><strong class="text-gray-400">DOB:</strong> <span class="text-gray-200">${user.dob || 'N/A'}</span></div>
                    <div><strong class="text-gray-400">Birth Place:</strong> <span class="text-gray-200">${user.birth_place || 'N/A'}</span></div>
                    <div><strong class="text-gray-400">Mobile:</strong> <span class="text-gray-200">${user.mobile_number || 'N/A'}</span></div>
                    <div><strong class="text-gray-400">Address:</strong> <span class="text-gray-200">${user.address || 'N/A'}</span></div>
                </div>
            </div>
        `;
        return card;
    }

    // Function to toggle visibility of user details
    function toggleDetails(button) {
        const content = button.closest('.bg-gray-700').querySelector('.details-content');
        if (content.style.display === 'none') {
            content.style.display = 'block';
            button.innerHTML = 'Details &uarr;';
        } else {
            content.style.display = 'none';
            button.innerHTML = 'Details &darr;';
        }
    }

    // Fetch and display all users
    async function fetchUsers() {
        const response = await fetch(`${API_BASE_URL}/api/admin/users`, {
            method: 'GET',
            headers: {
                'Content-Type': 'application/json',
                'x-access-token': token
            }
        });

        if (!response.ok) {
            console.error('Failed to fetch users:', response.statusText);
            return;
        }

        const users = await response.json();
        const pendingUsersContainer = document.getElementById('pendingUsers');
        const activeUsersContainer = document.getElementById('activeUsers');

        pendingUsersContainer.innerHTML = '';
        activeUsersContainer.innerHTML = '';

        users.forEach(user => {
            const userCard = createUserCard(user);
            if (user.is_active) {
                activeUsersContainer.appendChild(userCard);
            } else {
                pendingUsersContainer.appendChild(userCard);
            }
        });
    }

    // Approve a user
    async function approveUser(userId) {
        const response = await fetch(`${API_BASE_URL}/api/admin/approve/${userId}`, {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json',
                'x-access-token': token
            }
        });

        if (response.ok) {
            fetchUsers();
        } else {
            console.error('Failed to approve user:', response.statusText);
        }
    }

    // Delete a user
    async function deleteUser(userId) {
        if (!confirm('Are you sure you want to delete this user?')) return;

        const response = await fetch(`${API_BASE_URL}/api/admin/users/${userId}`, {
            method: 'DELETE',
            headers: {
                'Content-Type': 'application/json',
                'x-access-token': token
            }
        });

        if (response.ok) {
            fetchUsers();
        } else {
            console.error('Failed to delete user:', response.statusText);
        }
    }

    document.addEventListener('DOMContentLoaded', () => {
        if (!token) {
            window.location.href = 'login.html';
        } else {
            fetchUsers();
        }
    });
  </script>
</body>
</html>
