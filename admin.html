<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Panel</title>
	<script src="config.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; }

        /* --- Button Styles for User Cards --- */
        .action-btn {
            padding: 5px 12px;
            border-radius: 6px;
            font-size: 14px;
            font-weight: 600;
            border: none;
            cursor: pointer;
            transition: background-color 0.2s, color 0.2s;
            color: white;
        }
        .approve-btn {
            background-color: #22c55e; /* green-500 */
        }
        .approve-btn:hover {
            background-color: #16a34a; /* green-600 */
        }
        .delete-btn {
            background-color: #ef4444; /* red-500 */
        }
        .delete-btn:hover {
            background-color: #dc2626; /* red-600 */
        }
        .details-btn {
            background-color: #64748b; /* slate-500 */
        }
        .details-btn:hover {
            background-color: #475569; /* slate-600 */
        }
    </style>
</head>
<body class="bg-gray-900 text-gray-200">
  <div class="container mx-auto p-4 md:p-8">
    <header class="flex justify-between items-center mb-8">
      <div>
        <h1 class="text-4xl font-bold text-white">Admin Panel</h1>
        <p class="text-gray-400">User Management</p>
      </div>
      <a href="HomePage.html" class="px-4 py-2 bg-indigo-600 hover:bg-indigo-700 text-white font-semibold rounded-lg transition-colors">&larr; Back to Dashboard</a>
    </header>
    
    <!-- Search and Filters -->
    <div class="mb-6 bg-gray-800 p-4 rounded-xl border border-gray-700">
      <div class="flex flex-col md:flex-row gap-4">
        <input type="text" id="searchInput" placeholder="Search users..." class="flex-1 p-2 bg-gray-700 border border-gray-600 rounded-lg text-white">
        <select id="roleFilter" class="p-2 bg-gray-700 border border-gray-600 rounded-lg text-white">
          <option value="">All Roles</option>
          <option value="admin">Admin</option>
          <option value="production">Production</option>
          <option value="proto">Proto</option>
          <option value="custom">Custom</option>
        </select>
      </div>
    </div>
    
    <!-- User List -->
    <div class="bg-gray-800 p-6 rounded-xl border border-gray-700">
      <h2 class="text-2xl font-bold text-white mb-4">All Users</h2>
      <div id="usersTable" class="overflow-x-auto">
        <table class="w-full text-sm text-left text-gray-300">
          <thead class="text-xs text-gray-400 uppercase bg-gray-700">
            <tr>
              <th class="px-6 py-3">Username</th>
              <th class="px-6 py-3">Email</th>
              <th class="px-6 py-3">Role</th>
              <th class="px-6 py-3">Registration Date</th>
              <th class="px-6 py-3">Last Login</th>
              <th class="px-6 py-3">Actions</th>
            </tr>
          </thead>
          <tbody id="usersTableBody">
            <!-- Users will be populated here -->
          </tbody>
        </table>
      </div>
    </div>
  </div>
  
  <!-- User Details Modal -->
  <div id="userModal" class="fixed inset-0 bg-black bg-opacity-50 hidden z-50">
    <div class="flex items-center justify-center min-h-screen p-4">
      <div class="bg-gray-800 rounded-xl max-w-2xl w-full max-h-[90vh] overflow-y-auto">
        <div class="p-6">
          <div class="flex justify-between items-center mb-4">
            <h3 class="text-xl font-bold text-white">User Details</h3>
            <button onclick="closeModal()" class="text-gray-400 hover:text-white">&times;</button>
          </div>
          <div id="userDetailsContent">
            <!-- User details will be populated here -->
          </div>
        </div>
      </div>
    </div>
  </div>
  <script>
    const token = localStorage.getItem('token');
    let allUsers = [];

    // Helper function to format date as dd/mm/yyyy
    function formatDate(dateString) {
        if (!dateString) return 'N/A';
        const date = new Date(dateString);
        const day = String(date.getDate()).padStart(2, '0');
        const month = String(date.getMonth() + 1).padStart(2, '0');
        const year = date.getFullYear();
        return `${day}/${month}/${year}`;
    }

    // Helper function to format time as hh:mm AM/PM
    function formatTime(dateString) {
        if (!dateString) return 'Never';
        const date = new Date(dateString);
        let hours = date.getHours();
        const minutes = String(date.getMinutes()).padStart(2, '0');
        const ampm = hours >= 12 ? 'PM' : 'AM';
        hours = hours % 12;
        hours = hours ? hours : 12; // the hour '0' should be '12'
        return `${hours}:${minutes} ${ampm}`;
    }

    // Helper function to format date and time as dd/mm/yyyy hh:mm AM/PM
    function formatDateTime(dateString) {
        if (!dateString) return 'Never';
        return `${formatDate(dateString)} ${formatTime(dateString)}`;
    }

    // Function to create table row for a user
    function createUserRow(user) {
        const row = document.createElement('tr');
        row.className = 'border-b border-gray-700 hover:bg-gray-700';
        
        const createdAt = formatDate(user.created_at);
        const lastLogin = formatDateTime(user.last_login);
        
        row.innerHTML = `
            <td class="px-6 py-4 font-medium text-white">${user.username}</td>
            <td class="px-6 py-4 text-gray-300">${user.email}</td>
            <td class="px-6 py-4">
                <span class="px-2 py-1 text-xs font-semibold rounded-full 
                    ${user.role === 'admin' ? 'bg-red-500 text-white' : 
                      user.role === 'production' ? 'bg-blue-500 text-white' : 
                      user.role === 'proto' ? 'bg-green-500 text-white' : 
                      'bg-purple-500 text-white'}">
                    ${user.role}
                </span>
            </td>
            <td class="px-6 py-4 text-gray-300">${createdAt}</td>
            <td class="px-6 py-4 text-gray-300">${lastLogin}</td>
            <td class="px-6 py-4">
                <button onclick="showUserDetails(${user.id})" class="text-indigo-400 hover:text-indigo-300 mr-2">View</button>
                ${user.role !== 'admin' ? `<button onclick="deleteUser(${user.id})" class="text-red-400 hover:text-red-300">Delete</button>` : ''}
            </td>
        `;
        return row;
    }

    // Function to show user details modal
    async function showUserDetails(userId) {
        const user = allUsers.find(u => u.id === userId);
        if (!user) return;

        const modal = document.getElementById('userModal');
        const content = document.getElementById('userDetailsContent');
        
        // Get user permissions
        let permissions = [];
        try {
            const response = await fetch(`${APP_CONFIG.API_BASE_URL}/api/admin/users/${userId}/permissions`, {
                method: 'GET',
                headers: {
                    'Content-Type': 'application/json',
                    'x-access-token': token
                }
            });
            if (response.ok) {
                permissions = await response.json();
            }
        } catch (error) {
            console.error('Failed to fetch permissions:', error);
        }

        // Get all devices for machine selection
        let allDevices = [];
        try {
            const response = await fetch(`${APP_CONFIG.API_BASE_URL}/api/devices`, {
                method: 'GET',
                headers: {
                    'Content-Type': 'application/json',
                    'x-access-token': token
                }
            });
            if (response.ok) {
                allDevices = await response.json();
            }
        } catch (error) {
            console.error('Failed to fetch devices:', error);
        }

        const createdAt = formatDateTime(user.created_at);
        const lastLogin = formatDateTime(user.last_login);

        content.innerHTML = `
            <div class="space-y-4">
                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label class="block text-sm font-medium text-gray-400">Username</label>
                        <p class="text-white">${user.username}</p>
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-400">Email</label>
                        <p class="text-white">${user.email}</p>
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-400">Full Name</label>
                        <p class="text-white">${user.full_name || 'N/A'}</p>
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-400">Company</label>
                        <p class="text-white">${user.company || 'N/A'}</p>
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-400">Registration Date</label>
                        <p class="text-white">${createdAt}</p>
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-400">Last Login</label>
                        <p class="text-white">${lastLogin}</p>
                    </div>
                </div>
                
                <div>
                    <label class="block text-sm font-medium text-gray-400 mb-2">Access Level</label>
                    <div class="flex gap-2">
                        <select id="roleSelect" class="flex-1 p-2 bg-gray-700 border border-gray-600 rounded-lg text-white">
                            <option value="admin" ${user.role === 'admin' ? 'selected' : ''}>Admin - Full access</option>
                            <option value="production" ${user.role === 'production' ? 'selected' : ''}>Production - Limited machines</option>
                            <option value="proto" ${user.role === 'proto' ? 'selected' : ''}>Proto - All machines, read-only</option>
                            <option value="custom" ${user.role === 'custom' ? 'selected' : ''}>Custom - Configurable access</option>
                        </select>
                        <button onclick="confirmRoleUpdate(${user.id})" class="px-4 py-2 bg-indigo-600 hover:bg-indigo-700 text-white font-semibold rounded-lg transition-colors">
                            Save
                        </button>
                    </div>
                </div>
                
                <div class="role-permissions">
                <!-- Role-specific permissions will be inserted here -->
                </div>
            </div>
        `;
        
        modal.classList.remove('hidden');
        
        // Initialize role permissions content
        updateModalContentForRole(user, allDevices, permissions, user.role);
        
        // Add event listener for role select to update modal content
        const roleSelect = document.getElementById('roleSelect');
        roleSelect.addEventListener('change', function() {
            updateModalContentForRole(user, allDevices, permissions, this.value);
        });
    }

    // Function to update modal content when role changes
    function updateModalContentForRole(user, allDevices, permissions, selectedRole) {
        const content = document.getElementById('userDetailsContent');
        const rolePermissionsDiv = content.querySelector('.role-permissions');
        
        if (!rolePermissionsDiv) return;
        
        let newContent = '';
        
        if (selectedRole === 'production') {
            newContent = `
                <div>
                    <label class="block text-sm font-medium text-gray-400 mb-2">Select Machines for Access</label>
                    <div class="bg-gray-700 p-3 rounded-lg max-h-48 overflow-y-auto">
                        ${allDevices.map(device => {
                            const isSelected = permissions.some(p => p.device_id === device.id);
                            return `
                                <label class="flex items-center space-x-2 py-1">
                                    <input type="checkbox" class="machine-checkbox w-4 h-4 bg-gray-600 border-gray-500 rounded text-indigo-500" 
                                           value="${device.id}" ${isSelected ? 'checked' : ''}>
                                    <span class="text-white text-sm">${device.machine_model || device.name} (${device.serial})</span>
                                </label>
                            `;
                        }).join('')}
                    </div>
                    <p class="text-xs text-gray-400 mt-2">Select the machines this user can access. Only checked machines will be visible to them.</p>
                </div>
            `;
        } else if (selectedRole === 'custom') {
            newContent = `
                <div>
                    <label class="block text-sm font-medium text-gray-400 mb-2">Configure Machine Access & Data Fields</label>
                    <div class="space-y-4 max-h-96 overflow-y-auto">
                        ${allDevices.map(device => {
                            const devicePermission = permissions.find(p => p.device_id === device.id);
                            const isSelected = !!devicePermission;
                            const visibleData = devicePermission ? devicePermission.visible_data : [];
                            const visibleLogs = devicePermission ? devicePermission.visible_logs : [];
                            const dataFields = Object.keys(device.parameters || {});
                            
                            return `
                                <div class="bg-gray-700 p-3 rounded-lg">
                                    <label class="flex items-center space-x-2 mb-2">
                                        <input type="checkbox" class="machine-checkbox w-4 h-4 bg-gray-600 border-gray-500 rounded text-indigo-500" 
                                               value="${device.id}" ${isSelected ? 'checked' : ''}>
                                        <span class="text-white font-medium">${device.machine_model || device.name} (${device.serial})</span>
                                    </label>
                                    <div class="ml-6 data-fields-${device.id}" style="display: ${isSelected ? 'block' : 'none'}">
                                        <p class="text-xs text-gray-400 mb-2">Select data fields this user can view:</p>
                                        <div class="grid grid-cols-2 gap-2 mb-4">
                                            ${dataFields.map(field => {
                                                const isChecked = visibleData.includes(field);
                                                return `
                                                    <label class="flex items-center space-x-2">
                                                        <input type="checkbox" class="data-field-checkbox w-3 h-3 bg-gray-600 border-gray-500 rounded text-indigo-500" 
                                                               data-device-id="${device.id}" data-field="${field}" ${isChecked ? 'checked' : ''}>
                                                        <span class="text-gray-300 text-xs">${field.replace(/_/g, ' ')}</span>
                                                    </label>
                                                `;
                                            }).join('')}
                                        </div>
                                        <p class="text-xs text-gray-400 mb-2">Select logger data this user can access:</p>
                                        <div class="bg-gray-600 p-2 rounded max-h-32 overflow-y-auto">
                                            ${device.log_folders ? device.log_folders.map(folder => {
                                                const isChecked = visibleLogs.includes(folder.id.toString()) || visibleLogs.includes(folder.name);
                                                return `
                                                    <label class="flex items-center space-x-2 py-1">
                                                        <input type="checkbox" class="log-folder-checkbox w-3 h-3 bg-gray-500 border-gray-400 rounded text-indigo-500" 
                                                               data-device-id="${device.id}" data-folder-id="${folder.id}" data-folder-name="${folder.name}" ${isChecked ? 'checked' : ''}>
                                                        <span class="text-gray-300 text-xs">📁 ${folder.name} (${folder.file_count} files)</span>
                                                    </label>
                                                    ${folder.files ? folder.files.map(file => {
                                                        const isFileChecked = visibleLogs.includes(file.id.toString()) || visibleLogs.includes(file.name);
                                                        return `
                                                            <label class="flex items-center space-x-2 py-1 ml-4">
                                                                <input type="checkbox" class="log-file-checkbox w-3 h-3 bg-gray-500 border-gray-400 rounded text-indigo-500" 
                                                                       data-device-id="${device.id}" data-file-id="${file.id}" data-file-name="${file.name}" ${isFileChecked ? 'checked' : ''}>
                                                                <span class="text-gray-400 text-xs">📄 ${file.name} (${file.size})</span>
                                                            </label>
                                                        `;
                                                    }).join('') : ''}
                                                `;
                                            }).join('') : '<p class="text-gray-400 text-xs">No log data available</p>'}
                                        </div>
                                    </div>
                                </div>
                            `;
                        }).join('')}
                    </div>
                    <p class="text-xs text-gray-400 mt-2">Select machines and configure which data fields and logger data are visible for each machine.</p>
                </div>
            `;
        }
        
        rolePermissionsDiv.innerHTML = newContent;
        
        // Re-add event listeners for the new content
        if (selectedRole === 'custom') {
            const machineCheckboxes = document.querySelectorAll('.machine-checkbox');
            machineCheckboxes.forEach(checkbox => {
                checkbox.addEventListener('change', function() {
                    const deviceId = this.value;
                    const dataFieldsDiv = document.querySelector(`.data-fields-${deviceId}`);
                    if (dataFieldsDiv) {
                        dataFieldsDiv.style.display = this.checked ? 'block' : 'none';
                    }
                });
            });
        }
    }

    // Function to close modal
    function closeModal() {
        document.getElementById('userModal').classList.add('hidden');
    }

    // Function to confirm role update
    async function confirmRoleUpdate(userId) {
        const roleSelect = document.getElementById('roleSelect');
        const newRole = roleSelect.value;
        const user = allUsers.find(u => u.id === userId);
        
        if (!user) {
            alert('User not found');
            return;
        }
        
        if (user.role === newRole) {
            alert('No changes detected. The role is already set to ' + newRole);
            return;
        }
        
        // Handle machine permissions for Production role
        if (newRole === 'production') {
            const selectedMachines = [];
            const checkboxes = document.querySelectorAll('.machine-checkbox:checked');
            checkboxes.forEach(checkbox => {
                selectedMachines.push(parseInt(checkbox.value));
            });
            
            if (selectedMachines.length === 0) {
                alert('Please select at least one machine for Production role.');
                return;
            }
            
            // Save machine permissions
            try {
                for (const deviceId of selectedMachines) {
                    await fetch(`${APP_CONFIG.API_BASE_URL}/api/admin/users/${userId}/permissions`, {
                        method: 'PUT',
                        headers: {
                            'Content-Type': 'application/json',
                            'x-access-token': token
                        },
                        body: JSON.stringify({ 
                            device_id: deviceId, 
                            visible_data: [], // Empty array means all data visible for Production
                            visible_logs: [] // Empty array means all logs visible for Production
                        })
                    });
                }
                
                // Remove permissions for unchecked machines
                const allMachineCheckboxes = document.querySelectorAll('.machine-checkbox');
                const uncheckedMachines = [];
                allMachineCheckboxes.forEach(checkbox => {
                    if (!checkbox.checked) {
                        uncheckedMachines.push(parseInt(checkbox.value));
                    }
                });
                
                // Note: In a real implementation, you'd want to remove unchecked permissions
                // For now, we'll just add the selected ones
                
            } catch (error) {
                console.error('Error saving machine permissions:', error);
                alert('Error saving machine permissions');
                return;
            }
        }
        
        // Handle machine permissions for Custom role
        if (newRole === 'custom') {
            const selectedMachines = [];
            const machineCheckboxes = document.querySelectorAll('.machine-checkbox:checked');
            
            if (machineCheckboxes.length === 0) {
                alert('Please select at least one machine for Custom role.');
                return;
            }
            
            // Collect permissions for each selected machine
            for (const checkbox of machineCheckboxes) {
                const deviceId = parseInt(checkbox.value);
                const selectedDataFields = [];
                const selectedLogs = [];
                
                // Get selected data fields for this machine
                const dataFieldCheckboxes = document.querySelectorAll(`.data-field-checkbox[data-device-id="${deviceId}"]:checked`);
                dataFieldCheckboxes.forEach(fieldCheckbox => {
                    selectedDataFields.push(fieldCheckbox.getAttribute('data-field'));
                });
                
                // Get selected log folders and files for this machine
                const logFolderCheckboxes = document.querySelectorAll(`.log-folder-checkbox[data-device-id="${deviceId}"]:checked`);
                const logFileCheckboxes = document.querySelectorAll(`.log-file-checkbox[data-device-id="${deviceId}"]:checked`);
                
                logFolderCheckboxes.forEach(folderCheckbox => {
                    selectedLogs.push(folderCheckbox.getAttribute('data-folder-id'));
                    selectedLogs.push(folderCheckbox.getAttribute('data-folder-name'));
                });
                
                logFileCheckboxes.forEach(fileCheckbox => {
                    selectedLogs.push(fileCheckbox.getAttribute('data-file-id'));
                    selectedLogs.push(fileCheckbox.getAttribute('data-file-name'));
                });
                
                if (selectedDataFields.length === 0) {
                    alert(`Please select at least one data field for machine ${checkbox.nextElementSibling.textContent}.`);
                    return;
                }
                
                selectedMachines.push({
                    device_id: deviceId,
                    visible_data: selectedDataFields,
                    visible_logs: selectedLogs
                });
            }
            
            // Save permissions for each machine
            try {
                for (const permission of selectedMachines) {
                    await fetch(`${APP_CONFIG.API_BASE_URL}/api/admin/users/${userId}/permissions`, {
                        method: 'PUT',
                        headers: {
                            'Content-Type': 'application/json',
                            'x-access-token': token
                        },
                        body: JSON.stringify(permission)
                    });
                }
                
                // Remove permissions for unchecked machines
                const allMachineCheckboxes = document.querySelectorAll('.machine-checkbox');
                const uncheckedMachines = [];
                allMachineCheckboxes.forEach(checkbox => {
                    if (!checkbox.checked) {
                        uncheckedMachines.push(parseInt(checkbox.value));
                    }
                });
                
                // Note: In a real implementation, you'd want to remove unchecked permissions
                // For now, we'll just add the selected ones
                
            } catch (error) {
                console.error('Error saving custom permissions:', error);
                alert('Error saving custom permissions');
                return;
            }
        }
        
        // Update the role
        await updateUserRole(userId, newRole);
    }

    // Function to update user role
    async function updateUserRole(userId, newRole) {
        try {
            const response = await fetch(`${APP_CONFIG.API_BASE_URL}/api/admin/users/${userId}/role`, {
                method: 'PUT',
                headers: {
                    'Content-Type': 'application/json',
                    'x-access-token': token
                },
                body: JSON.stringify({ role: newRole })
            });

            if (response.ok) {
                // Refresh users list
                fetchUsers();
                // Close and reopen modal to refresh details
                closeModal();
                alert('User role updated successfully!');
            } else {
                alert('Failed to update user role');
            }
        } catch (error) {
            console.error('Error updating role:', error);
            alert('Error updating user role');
        }
    }

    // Function to delete user
    async function deleteUser(userId) {
        if (!confirm('Are you sure you want to delete this user?')) return;

        try {
            const response = await fetch(`${APP_CONFIG.API_BASE_URL}/api/admin/users/${userId}`, {
                method: 'DELETE',
                headers: {
                    'Content-Type': 'application/json',
                    'x-access-token': token
                }
            });

            if (response.ok) {
                fetchUsers();
            } else {
                alert('Failed to delete user');
            }
        } catch (error) {
            console.error('Error deleting user:', error);
            alert('Error deleting user');
        }
    }

    // Function to fetch and display all users
    async function fetchUsers() {
        try {
            const response = await fetch(`${APP_CONFIG.API_BASE_URL}/api/admin/users`, {
                method: 'GET',
                headers: {
                    'Content-Type': 'application/json',
                    'x-access-token': token
                }
            });

            if (!response.ok) {
                console.error('Failed to fetch users');
                return;
            }

            allUsers = await response.json();
            displayUsers(allUsers);
        } catch (error) {
            console.error('Error fetching users:', error);
        }
    }

    // Function to display users in table
    function displayUsers(users) {
        const tbody = document.getElementById('usersTableBody');
        tbody.innerHTML = '';

        users.forEach(user => {
            const row = createUserRow(user);
            tbody.appendChild(row);
        });
    }

    // Function to filter users
    function filterUsers() {
        const searchTerm = document.getElementById('searchInput').value.toLowerCase();
        const roleFilter = document.getElementById('roleFilter').value;

        const filteredUsers = allUsers.filter(user => {
            const matchesSearch = user.username.toLowerCase().includes(searchTerm) || 
                                user.email.toLowerCase().includes(searchTerm) ||
                                (user.full_name && user.full_name.toLowerCase().includes(searchTerm));
            const matchesRole = !roleFilter || user.role === roleFilter;
            return matchesSearch && matchesRole;
        });

        displayUsers(filteredUsers);
    }

    document.addEventListener('DOMContentLoaded', () => {
        if (!token) {
            window.location.href = 'login.html';
        } else {
            fetchUsers();
            
            // Add event listeners for search and filter
            document.getElementById('searchInput').addEventListener('input', filterUsers);
            document.getElementById('roleFilter').addEventListener('change', filterUsers);
        }
    });
  </script>
</body>
</html>
