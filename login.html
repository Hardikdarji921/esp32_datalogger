<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Telematics Dashboard</title>
    <script src="config.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap');
        body {
            font-family: 'Inter', sans-serif;
        }
    </style>
</head>
<body class="bg-gray-900 text-gray-200 min-h-screen flex items-center justify-center p-4">

    <div class="max-w-md w-full mx-auto">
        <div class="bg-gray-800 rounded-xl shadow-lg p-8 border border-gray-700">
            <h1 class="text-3xl font-bold text-white text-center mb-2">Welcome Back!</h1>
            <p class="text-center text-gray-400 mb-8">Sign in to continue to your dashboard.</p>
            
            <form id="login-form" class="space-y-6">
                <div>
                    <label for="username" class="text-sm font-medium text-gray-400">Username</label>
                    <input type="text" id="username" name="username" class="mt-1 w-full p-3 bg-gray-700 border border-gray-600 rounded-lg text-white focus:ring-indigo-500 focus:border-indigo-500" placeholder="e.g., hardik" required>
                </div>
                
                <div>
                    <div class="flex justify-between items-center">
                        <label for="password" class="text-sm font-medium text-gray-400">Password</label>
                        <a href="forgot_password.html" class="text-sm text-indigo-400 hover:underline">Forgot password?</a>
                    </div>
                    <input type="password" id="password" name="password" class="mt-1 w-full p-3 bg-gray-700 border border-gray-600 rounded-lg text-white focus:ring-indigo-500 focus:border-indigo-500" placeholder="••••••••" required>
                </div>

                <div>
                    <button type="submit" class="w-full px-4 py-3 bg-indigo-600 hover:bg-indigo-700 text-white font-bold rounded-lg transition duration-150 shadow-lg">
                        Login
                    </button>
                </div>
            </form>

            <div id="error-message" class="mt-4 text-center text-red-400 text-sm"></div>

            <div class="mt-6 text-center">
                <p class="text-sm text-gray-400">
                    Don't have an account? <a href="register.html" class="font-medium text-indigo-400 hover:underline">Sign up</a>
                </p>
            </div>
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const loginForm = document.getElementById('login-form');
            const usernameInput = document.getElementById('username');
            const passwordInput = document.getElementById('password');
            const errorMessage = document.getElementById('error-message');

            loginForm.addEventListener('submit', (event) => {
                // Prevent the form from refreshing the page
                event.preventDefault();
                errorMessage.textContent = ''; // Clear previous errors

                const username = usernameInput.value;
                const password = passwordInput.value;

                // Send the data to the backend API
                fetch(`${APP_CONFIG.API_BASE_URL}/api/login`, {		//used for run in local system
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({
                        username: username,
                        password: password,
                    }),
                })
                .then(response => response.json())
                .then(data => {
                    if (data.token) {
                        // SUCCESS: If we get a token, save it and redirect
                        localStorage.setItem('token', data.token);
                        window.location.href = 'HomePage.html'; // Redirect to the dashboard
                    } else {
                        // FAILURE: If there's no token, display the error message from the server
                        errorMessage.textContent = data.message || 'An unknown error occurred.';
                    }
                })
                .catch(error => {
                    console.error('Login Error:', error);
                    errorMessage.textContent = 'Could not connect to the server.';
                });
            });
        });
    </script>
</body>
</html>
